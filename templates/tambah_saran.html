<!DOCTYPE html>
<html>
<head>
<title>Tambah Saran</title>

<link rel="stylesheet" href="bgsapi5.jpg">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
padding-top:90px;
background:#f5f5f5;
}

/* NAVBAR */
.navbar{
width:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
position:fixed;
top:0;
left:0;
z-index:1000;
}

.logo{
font-size:18px;
font-weight:bold;
color:white;
}

.back-btn{
background:#e53935;
color:white;
text-decoration:none;
padding:8px 18px;
border-radius:20px;
font-weight:bold;
}

/* BACKGROUND */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("/static/bgsapi5.jpg");
background-size:cover;
background-position:center;
filter:blur(6px);
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:-1;
}

/* CONTAINER */
.container{
max-width:800px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* INFO */
.info{
background:#f9f9f9;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

.info p{
margin-bottom:8px;
}

/* TEXTAREA */
textarea{
width:100%;
height:120px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-top:10px;
}

/* BUTTON */
button{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:25px;
font-weight:bold;
cursor:pointer;
background:#2196F3;
color: white
}


</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">Sistem Pakar Diagnosa Penyakit Sapi</div>
<a href="/admin" class="back-btn">Kembali</a>
</div>

<div class="container">
<div class="card">

<h2>Tambah / Edit Saran Dokter</h2>

<!-- ✅ DATA FIX DI SINI -->
<div class="info">
<p><b>User:</b> {{ data.username }}</p>
<p><b>Gejala:</b> {{ data.gejala }}</p>
<p><b>Penyakit:</b> {{ data.penyakit }}</p>
</div>

<form method="POST">

<label><b>Saran Dokter</b></label>

<textarea name="saran_dokter" placeholder="Masukkan saran...">{{ data.saran_dokter if data.saran_dokter else '' }}</textarea>

<button type="submit">
<i class="fa-solid fa-floppy-disk"></i> Simpan
</button>
</div>

</body>
</html>
